name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Unsigned IPA
    runs-on: macos-14
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get > pub_get_output.txt 2>&1 || (cat pub_get_output.txt && exit 1)

      - name: Push Log to Debug Branch
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b debug-log
          git add pub_get_output.txt
          git commit -m "Add pub get failure log"
          git push origin debug-log --force

      - name: Upload Pub Get Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pub-get-log
          path: pub_get_output.txt

      - name: Build iOS App (Unsigned)
        run: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-Unsigned-IPA
          path: Runner.ipa
